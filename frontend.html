<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Online Voting System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        input[type="text"]:focus, select:focus {
            border-color: #3498db;
            outline: none;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .radio-label:hover {
            background-color: #f9f9f9;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #27ae60;
        }

        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Online Voting Portal</h2>
    <form id="votingForm">
        <div class="form-group">
            <label for="voterId">Voter ID / Student ID</label>
            <input type="text" id="voterId" placeholder="Enter your unique ID" required>
        </div>

        <div class="form-group">
            <label>Select your Candidate</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="candidate" value="Candidate A" required> Candidate A
                </label>
                <label class="radio-label">
                    <input type="radio" name="candidate" value="Candidate B"> Candidate B
                </label>
                <label class="radio-label">
                    <input type="radio" name="candidate" value="Candidate C"> Candidate C
                </label>
            </div>
        </div>

        <button type="submit">Submit Vote</button>
    </form>
    <div id="message"></div>
</div>

<script>
    document.getElementById('votingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const voterId = document.getElementById('voterId').value;
        const candidate = document.querySelector('name="candidate":checked').value;
        const messageDiv = document.getElementById('message');

        try {
            const response = await fetch('http://localhost:5000/api/vote', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ voterId, candidate })
            });

            const data = await response.json();

            if (response.ok) {
                messageDiv.style.color = '#27ae60';
                messageDiv.textContent = data.message;
                document.getElementById('votingForm').reset();
            } else {
                messageDiv.style.color = '#e74c3c';
                messageDiv.textContent = data.error || 'An error occurred.';
            }
        } catch (error) {
            messageDiv.style.color = '#e74c3c';
            messageDiv.textContent = 'Could not connect to the server.';
        }
    });
</script>

</body>
</html>
